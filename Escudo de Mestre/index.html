<head>

  <style>
    /* === ESTILOS ESPECÍFICOS DO GERADOR DE NPC === */

    .npc-ficha {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .npc-linha {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(201,168,76,0.14);
      font-size: 16px;
      color: var(--text-main);
    }

    .npc-linha:last-child {
      border-bottom: none;
    }

    .npc-linha .label {
      font-family: var(--font-heading);
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 180px;
      flex-shrink: 0;
    }

    @media (max-width: 520px) {
      .npc-linha { flex-direction: column; gap: 2px; }
      .npc-linha .label { min-width: unset; }
    }

    /* === HABILIDADE DE APOIO === */
    .habilidade-box {
      margin-top: 4px;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.3);
      border-left: 4px solid var(--gold);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .habilidade-nome {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .habilidade-desc {
      font-size: 15px;
      color: var(--text-main);
      line-height: 1.75;
      margin-bottom: 10px;
    }

    .habilidade-mecanica {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .mecanica-chip {
      font-family: var(--font-heading);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-dark);
    }

    .mecanica-chip.perigo {
      border-color: rgba(200,80,60,0.4);
      color: #e09080;
      background: rgba(200,80,60,0.06);
    }

    .ferimento-tracker {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(201,168,76,0.12);
    }

    .ferimento-label {
      font-family: var(--font-heading);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dark);
    }

    .ferimento-dots {
      display: flex;
      gap: 8px;
    }

    .ferimento-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(200,80,60,0.4);
      background: rgba(200,80,60,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .ferimento-dot.ativo {
      background: rgba(200,80,60,0.55);
      border-color: #e07060;
      box-shadow: 0 0 8px rgba(200,80,60,0.4);
    }

    .ferimento-dot:hover {
      border-color: #e07060;
    }

    .btn-rolar-d12 {
      font-family: var(--font-heading);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 4px;
      border: 1px solid rgba(201,168,76,0.4);
      background: rgba(0,0,0,0.2);
      color: var(--gold-bright);
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }

    .btn-rolar-d12:hover {
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201,168,76,0.2);
    }

    .resultado-d12 {
      font-family: var(--font-heading);
      font-size: 13px;
      color: var(--text-muted);
      margin-left: 8px;
      transition: color 0.3s;
    }

    .resultado-d12.par   { color: #e07060; }
    .resultado-d12.impar { color: #7de87d; }

    /* === SEÇÃO DE HISTÓRIA === */
    .historia-section {
      margin-top: 22px;
    }

    .historia-section h3 {
      margin-bottom: 14px;
    }

    .historia-paragrafo {
      font-size: 16px;
      color: var(--text-main);
      opacity: 0.88;
      line-height: 1.9;
      margin-bottom: 14px;
      font-style: italic;
    }

    .historia-paragrafo:last-child { margin-bottom: 0; }

    /* === ANIMAÇÃO === */
    @keyframes npcReveal {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #npc.visivel {
      animation: npcReveal 0.4s ease both;
    }
  </style>
</head>

    /* ============================================================
       GERADOR
    ============================================================ */

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function gerarNPC() {
      const sexo = Math.random() > 0.5 ? "Masculino" : "Feminino";
      const nome = sexo === "Masculino"
        ? rand(nomesMasculinos)
        : rand(nomesFemininos);

      const idade = Math.floor(Math.random() * 60) + 16;

      // Raça com chance de Mestiço
      let racaSelecionada = rand(racas);
      let racaFinal = racaSelecionada;
      if (racaSelecionada === "Mestiço") {
        const r1 = rand(racas.filter(r => r !== "Mestiço"));
        let r2 = rand(racas.filter(r => r !== "Mestiço" && r !== r1));
        racaFinal = `${r1}/${r2}`;
      }

      // Ocupação
      const ocup = rand(OCUPACOES);
      const habilidade = rand(ocup.habilidades);

      // História (1 a 3 parágrafos)
      const blocoHistoria = rand(ocup.historia);

      // ID único para o tracker desta ficha
      const uid = Date.now();

      // Monta HTML da habilidade
      const habHTML = `
        <div class="habilidade-box">
          <div class="habilidade-nome">⚡ ${habilidade.titulo}</div>
          <div class="habilidade-desc">${habilidade.desc}</div>
          <div class="habilidade-mecanica">
            <span class="mecanica-chip">🎯 ${habilidade.mecanica}</span>
            <span class="mecanica-chip perigo">⚠ Coloca o NPC em perigo</span>
            <span class="mecanica-chip perigo">🎲 Role 1d12 após o uso</span>
            <span class="mecanica-chip perigo">Par = 1 Ferimento · 2 Ferimentos = Incapacitado</span>
          </div>
          <div class="ferimento-tracker">
            <span class="ferimento-label">Ferimentos:</span>
            <div class="ferimento-dots">
              <div class="ferimento-dot" id="dot1-${uid}" onclick="toggleFerimento('dot1-${uid}')"></div>
              <div class="ferimento-dot" id="dot2-${uid}" onclick="toggleFerimento('dot2-${uid}')"></div>
            </div>
            <button class="btn-rolar-d12" onclick="rolarD12('${uid}')">🎲 Rolar 1d12</button>
            <span class="resultado-d12" id="res-${uid}"></span>
          </div>
        </div>`;

      // Monta HTML da história
      const historiaHTML = blocoHistoria
        .map(p => `<p class="historia-paragrafo">${p}</p>`)
        .join('');

      const html = `
        <h3 style="margin-bottom:20px; font-size:22px;">✦ ${nome}</h3>

        <div class="npc-ficha">
          <div class="npc-linha">
            <span class="label">Nome:</span>
            <span>${nome}</span>
          </div>
          <div class="npc-linha">
            <span class="label">Idade:</span>
            <span>${idade} anos</span>
          </div>
          <div class="npc-linha">
            <span class="label">Sexo:</span>
            <span>${sexo}</span>
          </div>
          <div class="npc-linha">
            <span class="label">Raça:</span>
            <span>${racaFinal}</span>
          </div>
          <div class="npc-linha">
            <span class="label">Ocupação / Trabalho:</span>
            <span>${ocup.nome}</span>
          </div>
          <div class="npc-linha" style="flex-direction:column; align-items:flex-start; gap:10px;">
            <span class="label">Habilidade de Apoio:</span>
            ${habHTML}
          </div>
        </div>

        <div class="historia-section">
          <h3>📜 História</h3>
          ${historiaHTML}
        </div>
      `;

      const npcDiv = document.getElementById("npc");
      npcDiv.style.display = "block";
      npcDiv.classList.remove("visivel");
      void npcDiv.offsetWidth; // reflow
      npcDiv.classList.add("visivel");
      npcDiv.innerHTML = html;
    }

    /* ============================================================
       TRACKER DE FERIMENTOS E D12
    ============================================================ */

    function toggleFerimento(id) {
      const dot = document.getElementById(id);
      if (dot) dot.classList.toggle('ativo');
    }

    function rolarD12(uid) {
      const resultado = Math.floor(Math.random() * 12) + 1;
      const resEl = document.getElementById('res-' + uid);
      if (!resEl) return;

      const par = resultado % 2 === 0;
      resEl.textContent = `→ ${resultado} (${par ? 'PAR — 1 ferimento!' : 'ímpar — salvo!'})`;
      resEl.className = 'resultado-d12 ' + (par ? 'par' : 'impar');

      if (par) {
        // Marca automaticamente o primeiro ferimento disponível
        const dot1 = document.getElementById('dot1-' + uid);
        const dot2 = document.getElementById('dot2-' + uid);
        if (dot1 && !dot1.classList.contains('ativo')) {
          dot1.classList.add('ativo');
        } else if (dot2 && !dot2.classList.contains('ativo')) {
          dot2.classList.add('ativo');
        }
      }
    }
  </script>
