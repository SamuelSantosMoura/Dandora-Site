<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blocos de personagens e monstros para o RPG Dandora — registre nome, vida, CA e anotações.">
  <title>Blocos de Monstros — Dandora</title>
  <link rel="shortcut icon" href="Image/Logo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="Aparencia.css">
</head>
<body>
  <div class="container">

    <h1>Dandora</h1>
    <p style="text-align:center; font-family:'Cinzel',serif; color:var(--gold-dark); letter-spacing:0.2em; font-size:13px; margin-top:-18px; margin-bottom:28px;">BLOCOS DE MONSTROS</p>

    <nav class="buttons">
      <a class="button-link" href="index.html">⚔ Gerar NPC</a>
      <a class="button-link" href="Escudo.html">📜 Escudo do Mestre</a>
      <a class="button-link" href="Monstros.html">🐉 Monstros</a>
      <a class="button-link" href="eventos.html">🎲 Eventos</a>
      <a class="button-link" href="iniciativa.html">⚡ Iniciativa</a>
      <a class="button-link" href="itens.html">✨ Itens Mágicos</a>
    </nav>

    <div id="blocos" class="monster-grid">
      <!-- Blocos gerados via JS -->
    </div>

  </div>

  <script>
    const numBlocos = 6;

    function criarBloco(index) {
      return `
      <div class="monster-card" id="card-${index}">
        <label for="nome-${index}">Nome da Criatura</label>
        <input type="text" id="nome-${index}" placeholder="ex.: Goblin Ferrugem" />
        <div style="display:flex;gap:10px;">
          <div style="flex:1;">
            <label for="vida-${index}">Vida</label>
            <input type="text" id="vida-${index}" placeholder="ex.: 45 / 45" style="width:100%;" />
          </div>
          <div style="flex:1;">
            <label for="ca-${index}">CA</label>
            <input type="text" id="ca-${index}" placeholder="ex.: 15" style="width:100%;" />
          </div>
        </div>
        <label for="anotacoes-${index}">Anotações</label>
        <textarea id="anotacoes-${index}" rows="4" placeholder="Habilidades, resistências, status…"></textarea>
      </div>`;
    }

    const container = document.getElementById('blocos');
    for (let i = 0; i < numBlocos; i++) {
      container.innerHTML += criarBloco(i);
    }

    function salvarDados(index) {
      localStorage.setItem(`bloco-${index}-nome`,      document.getElementById(`nome-${index}`).value);
      localStorage.setItem(`bloco-${index}-vida`,      document.getElementById(`vida-${index}`).value);
      localStorage.setItem(`bloco-${index}-ca`,        document.getElementById(`ca-${index}`).value);
      localStorage.setItem(`bloco-${index}-anotacoes`, document.getElementById(`anotacoes-${index}`).value);
    }

    for (let i = 0; i < numBlocos; i++) {
      document.getElementById(`nome-${i}`).value      = localStorage.getItem(`bloco-${i}-nome`)      || '';
      document.getElementById(`vida-${i}`).value      = localStorage.getItem(`bloco-${i}-vida`)      || '';
      document.getElementById(`ca-${i}`).value        = localStorage.getItem(`bloco-${i}-ca`)        || '';
      document.getElementById(`anotacoes-${i}`).value = localStorage.getItem(`bloco-${i}-anotacoes`) || '';

      document.getElementById(`nome-${i}`).addEventListener('input',      () => salvarDados(i));
      document.getElementById(`vida-${i}`).addEventListener('input',      () => salvarDados(i));
      document.getElementById(`ca-${i}`).addEventListener('input',        () => salvarDados(i));
      document.getElementById(`anotacoes-${i}`).addEventListener('input', () => salvarDados(i));
    }
  </script>
</body>
</html>
